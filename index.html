<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F172A" />
    <link rel="canonical" href="https://clearcaredentalenterprise.com/" />

    <title>Clear Care Dental Enterprise — Dental benefits platform for partners</title>
    <meta name="description" content="Clear Care Dental Enterprise is a white-label dental benefits platform for employers, TPAs, health-plan administrators, DSOs, associations, and partners — modern dental coverage with a member app, transparent pricing, and full admin tooling." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Clear Care Dental Enterprise" />
    <meta property="og:title" content="Clear Care Dental Enterprise — Dental benefits platform for partners" />
    <meta property="og:description" content="White-label dental benefits platform for employers, TPAs, DSOs, associations, and partners — without the complexity of traditional insurance." />
    <meta property="og:url" content="https://clearcaredentalenterprise.com/" />
    <meta property="og:image" content="https://clearcaredentalenterprise.com/Clear%20Care%20Dental%20logo%202026.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Clear Care Dental Enterprise — Dental benefits platform for partners" />
    <meta name="twitter:description" content="White-label dental benefits platform for employers, TPAs, DSOs, associations, and partners." />
    <meta name="twitter:image" content="https://clearcaredentalenterprise.com/Clear%20Care%20Dental%20logo%202026.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Structured data: Organization + WebSite (static, crawler-visible without JS) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Clear Care Dental Enterprise",
      "url": "https://clearcaredentalenterprise.com",
      "logo": "https://clearcaredentalenterprise.com/Clear%20Care%20Dental%20logo%202026.png",
      "description": "White-label dental benefits platform for employers, TPAs, health-plan administrators, DSOs, associations, and partners.",
      "parentOrganization": { "@type": "Organization", "name": "Clear Care Dental Group", "url": "https://clearcaredentalgroup.com" },
      "sameAs": ["https://clearcaredentalgroup.com"]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Clear Care Dental Enterprise",
      "url": "https://clearcaredentalenterprise.com"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
